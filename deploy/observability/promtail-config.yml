server:
  http_listen_port: 9080
  grpc_listen_port: 0

positions:
  filename: /var/lib/promtail/positions.yaml

clients:
  - url: http://loki:3100/loki/api/v1/push
    external_labels:
      cluster: cloud-demo

scrape_configs:
  - job_name: cloud-demo-containers
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        refresh_interval: 15s
    pipeline_stages:
      - docker: {}
    relabel_configs:
      - target_label: job
        replacement: cloud-demo-containers
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: shared|stack-a|stack-b|edge
        action: keep
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: mcp-service|gateway-service|monitor-service|user-service|activity-service|announcement-service|feedback-service|edge-nginx
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: instance
        replacement: '$1'
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__meta_docker_container_label_com_docker_compose_container_number]
        target_label: compose_container_number
      - source_labels: [__meta_docker_container_log_stream]
        target_label: stream
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: stack-(.*)
        target_label: stack
        replacement: '$1'
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: (shared|edge)
        target_label: stack
        replacement: '$1'

  - job_name: cloud-demo-edge-files
    static_configs:
      - targets:
          - localhost
        labels:
          stack: edge
          __path__: /var/log/cloud-demo/edge/**/*.log
