global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ['prometheus:9090']

  - job_name: shared-mcp-containers
    metrics_path: /actuator/prometheus
    docker_sd_configs:
      - host: unix:///var/run/docker.sock
        port: 9300
        refresh_interval: 15s
        match_first_network: false
    relabel_configs:
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        regex: shared
        action: keep
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        regex: mcp-service
        action: keep
      - source_labels: [__meta_docker_network_name]
        regex: shared-a-net
        action: keep
      - source_labels: [__meta_docker_container_name]
        regex: '/(.*)'
        target_label: instance
        replacement: '$1'
      - source_labels: [__meta_docker_container_label_com_docker_compose_project]
        target_label: compose_project
      - source_labels: [__meta_docker_container_label_com_docker_compose_service]
        target_label: compose_service
      - source_labels: [__meta_docker_container_label_com_docker_compose_container_number]
        target_label: compose_container_number
      - target_label: stack
        replacement: shared

  - job_name: stack-a-gateway-containers
