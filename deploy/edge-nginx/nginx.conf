upstream gateway_a {
    server gateway-a:9000;
    keepalive 64;
}

upstream gateway_b {
    server gateway-b:9000;
    keepalive 64;
}

upstream monitor_a {
    server monitor-a:9100;
    keepalive 16;
}

upstream monitor_b {
    server monitor-b:9100;
    keepalive 16;
}

upstream mcp_upstream {
    server mcp-service:9300;
    keepalive 16;
}

split_clients "${remote_addr}${http_user_agent}" $api_stack_bucket {
    50%     "a";
    *       "b";
}

map $http_x_stack_id $api_stack_override {
    default "";
    "a"    "a";
    "b"    "b";
}

map "$api_stack_override:$api_stack_bucket" $gateway_upstream {
    default  "gateway_b";
    "a:a"   "gateway_a";
    "a:b"   "gateway_a";
    "b:a"   "gateway_b";
    "b:b"   "gateway_b";
    ":a"    "gateway_a";
    ":b"    "gateway_b";
}

map "$api_stack_override:$api_stack_bucket" $effective_stack_id {
    default  "b";
    "a:a"   "a";
    "a:b"   "a";
    "b:a"   "b";
    "b:b"   "b";
    ":a"    "a";
    ":b"    "b";
}

server {
    listen 80;
    server_name _;

    root /usr/share/nginx/html;
    index index.html;
    charset utf-8;

    location = /healthz {
        add_header Content-Type text/plain;
        return 200 "ok";
    }

    location = /index.html {
        expires -1;
        add_header Cache-Control "no-store, no-cache, must-revalidate";
        add_header Pragma "no-cache";
    }

    location / {
        try_files $uri $uri/ /index.html;
    }

    location ^~ /api/ {
        proxy_pass http://$gateway_upstream;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Stack-Id $effective_stack_id;

        add_header X-Stack-Target $effective_stack_id always;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location = /monitor/a {
        return 302 /monitor/a/;
    }

    location = /monitor/b {
        return 302 /monitor/b/;
    }

    location ^~ /monitor/a/ {
        rewrite ^/monitor/a/(.*)$ /$1 break;
        proxy_pass http://monitor_a;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /monitor/a;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ^~ /monitor/b/ {
        rewrite ^/monitor/b/(.*)$ /$1 break;
        proxy_pass http://monitor_b;
        proxy_http_version 1.1;
        proxy_redirect off;

        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
        proxy_set_header X-Forwarded-Prefix /monitor/b;

        proxy_connect_timeout 5s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    location ^~ /.well-known/ {
        proxy_pass http://mcp_upstream;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header X-Forwarded-Host $http_host;
    }

    location = /authorize {
        proxy_pass http://mcp_upstream;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
    }

    location = /token {
        proxy_pass http://mcp_upstream;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
    }

    location = /register {
        proxy_pass http://mcp_upstream;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
    }

    location = /mcp {
        proxy_pass http://mcp_upstream/mcp;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
    }

    location ^~ /mcp/ {
        proxy_pass http://mcp_upstream;
        proxy_http_version 1.1;
        proxy_redirect off;
        proxy_set_header Host $http_host;
    }

    location ~* \.(?:css|js|mjs|jpg|jpeg|gif|png|svg|ico|webp|woff2?|ttf)$ {
        try_files $uri =404;
        expires 7d;
        add_header Cache-Control "public, max-age=604800, immutable";
        access_log off;
    }
}
