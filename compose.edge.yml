services:
  edge-nginx:
    build:
      context: .
      dockerfile: deploy/edge-nginx/Dockerfile
      args:
        NODE_IMAGE: ${NODE_IMAGE:-public.ecr.aws/docker/library/node:20-alpine}
        NGINX_IMAGE: ${NGINX_IMAGE:-public.ecr.aws/docker/library/nginx:1.27-alpine}
    restart: unless-stopped
    ports:
      - "${EDGE_HTTP_PORT:-8081}:80"
    volumes:
      - ./log/edge/edge-nginx:/var/log/nginx
    healthcheck:
      test: ["CMD", "wget", "-q", "-O", "/dev/null", "http://127.0.0.1/healthz"]
      interval: 15s
      timeout: 5s
      retries: 12
      start_period: 20s
    networks:
      edge-a-net:
      edge-b-net:
      edge-shared-net:

networks:
  edge-a-net:
    external: true
    name: edge-a-net
  edge-b-net:
    external: true
    name: edge-b-net
  edge-shared-net:
    external: true
    name: edge-shared-net
