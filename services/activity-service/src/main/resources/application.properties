spring.application.name=activity-service
server.port=8200

# Nacos注册中心配置
spring.cloud.nacos.discovery.server-addr=127.0.0.1:8848

# MySQL数据库配置
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver
spring.datasource.url=jdbc:mysql://localhost:3306/volunteer_platform?useUnicode=true&characterEncoding=utf-8&useSSL=false&serverTimezone=Asia/Shanghai
spring.datasource.username=root
spring.datasource.password=123888

# MyBatis-Plus配置
mybatis-plus.mapper-locations=classpath:mapper/*.xml
mybatis-plus.type-aliases-package=org.example.entity
mybatis-plus.configuration.map-underscore-to-camel-case=true
mybatis-plus.configuration.log-impl=org.apache.ibatis.logging.stdout.StdOutImpl

# Redis配置（用于防超卖）
spring.data.redis.host=127.0.0.1
spring.data.redis.port=6379
spring.data.redis.database=0
spring.data.redis.timeout=5000

# AI API配置（智能生成活动文案）
ai.api.url=https://api.openai.com/v1/chat/completions
ai.api.key=your-api-key-here
ai.api.model=gpt-3.5-turbo
